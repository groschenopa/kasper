<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Seite nicht gefunden – Luxis Puppentheater</title>
  <meta name="robots" content="noindex">
  <link rel="icon" href="/kasper/assets/favicon.svg" type="image/svg+xml">
  <!-- 404 ist selbsttragend gestaltet, damit sie auch bei tiefen URLs korrekt aussieht. -->
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;text-align:center;
      font-family:"Segoe UI",system-ui,sans-serif;color:#fff;padding:1.5rem;
      background:linear-gradient(135deg,#c71919,#9c1212)}
    .box{max-width:520px}
    h1{font-size:clamp(3rem,10vw,6rem);margin:0;color:#feffa9}
    p{font-size:1.2rem;line-height:1.6}
    a{display:inline-block;margin-top:1rem;background:#fca84a;color:#3a2400;
      font-weight:700;text-decoration:none;padding:.7rem 1.4rem;border-radius:999px}
  </style>
</head>
<body>
  <div class="box">
    <h1>404</h1>
    <p>Hoppla – diese Seite hat sich hinter dem Vorhang versteckt.</p>
    <a id="home" href="/kasper/">Zurück zur Startseite</a>
  </div>
  <script>
    // Auf eigener Domain (Root) statt im Projekt-Unterordner verlinken.
    if (location.hostname.indexOf("github.io") === -1) {
      document.getElementById("home").setAttribute("href", "/");
    }
  </script>
</body>
</html>
